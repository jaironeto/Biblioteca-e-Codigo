<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Biblioteca Multi-Linguagens</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    /* Estilo do Título Menu */
    .menu-container {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 36px;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      user-select: none;
    }

    h1::after {
      content: '▼';
      font-size: 18px;
      color: #0055aa;
    }

    /* Lista suspensa de bibliotecas */
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #fff;
      min-width: 250px;
      box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
      z-index: 1;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 5px;
    }

    .dropdown-content div {
      color: #333;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .dropdown-content div:hover {
      background-color: #0055aa;
      color: white;
    }

    .show {
      display: block;
    }

    /* Estilos da Biblioteca */
    .folder {
      margin: 20px 0;
      border: 2px solid #0055aa;
      border-radius: 8px;
      background: #e0f0ff;
      overflow: hidden;
    }

    .folder-header {
      font-size: 24px;
      font-weight: bold;
      padding: 12px;
      cursor: pointer;
      background: #0055aa;
      color: #fff;
      user-select: none;
    }

    .folder-header:hover {
      background: #003f7d;
    }

    .folder-content {
      display: none;
      padding: 16px;
      background: #fff;
    }

    /* ALTERAÇÃO: Tags agora ficam lado a lado */
    .tag {
      margin: 5px;
      font-size: 20px;
      font-weight: bold;
      color: #0055aa;
      cursor: pointer;
      position: relative;
      display: inline-block; /* Mudança de block para inline-block */
      padding: 6px 10px;
      background: #f0f8ff;
      border-radius: 6px;
      width: fit-content;
      vertical-align: top; /* Alinha as tags pelo topo */
    }

    .description {
      display: none;
      margin-top: 8px;
      font-size: 18px;
      color: #333;
      background: #fafafa;
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 6px;
      font-weight: normal;
      white-space: normal; /* Garante que o texto quebre dentro da caixa */
      max-width: 300px;    /* Opcional: limita a largura da descrição */
    }

    .tag.active .description {
      display: block;
    }

    .tag-image {
      display: block;
      max-width: 100%;
      height: auto;
      margin-top: 10px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
  </style>
</head>

    function toggleMenu() {
      document.getElementById("myDropdown").classList.toggle("show");
    }

    window.onclick = function (event) {
      if (!event.target.matches('h1')) {
        var dropdowns = document.getElementsByClassName("dropdown-content");
        for (var i = 0; i < dropdowns.length; i++) {
          var openDropdown = dropdowns[i];
          if (openDropdown.classList.contains('show')) {
            openDropdown.classList.remove('show');
          }
        }
      }
    }

    function selectLibrary(type) {
      const titles = {
        'CSS': 'Biblioteca CSS',
        'HTML': 'Biblioteca HTML',
        'JS': 'Exemplos JavaScript',
        'Java': 'Biblioteca Java',
        'Cod': 'Codigo',
        'Did': 'Didática JavaScript',
      };

      document.getElementById("mainTitle").textContent = titles[type];
      renderLibrary(db[type]);
    }

    function renderLibrary(activeData) {
      const library = document.getElementById("library");
      library.innerHTML = ""; 

      activeData.forEach(folder => {
        const folderDiv = document.createElement("div");
        folderDiv.className = "folder";

        const header = document.createElement("div");
        header.className = "folder-header";
        header.textContent = "📂 " + folder.category;

        const content = document.createElement("div");
        content.className = "folder-content";

        folder.tags.forEach(tag => {
          const tagDiv = document.createElement("div");
          tagDiv.className = "tag";
          tagDiv.textContent = tag.name;

          const desc = document.createElement("div");
          desc.className = "description";

          const textSpan = document.createElement("span");
          textSpan.textContent = tag.description;
          desc.appendChild(textSpan);

          if (tag.image) {
            const img = document.createElement("img");
            img.src = tag.image;
            img.className = "tag-image";
            desc.appendChild(img);
          }

          tagDiv.appendChild(desc);
          content.appendChild(tagDiv);

          tagDiv.addEventListener("click", (e) => {
            e.stopPropagation();
            tagDiv.classList.toggle("active");
          });
        });

        header.addEventListener("click", () => {
          content.style.display = content.style.display === "block" ? "none" : "block";
        });

        folderDiv.appendChild(header);
        folderDiv.appendChild(content);
        library.appendChild(folderDiv);
      });
    }

    renderLibrary(dataCSS);
