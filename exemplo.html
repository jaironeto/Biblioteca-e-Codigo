<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 48px 20px 80px; }
  header { text-align: center; margin-bottom: 40px; }
  h1 { font-size: 36px; font-weight: 800; margin: 0 0 10px; letter-spacing: -0.02em; color: #f8fafc; }
  header p { margin: 0; color: #94a3b8; font-size: 16px; }
  .search-wrap { position: relative; max-width: 520px; margin: 28px auto 0; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #64748b; pointer-events: none; }
  #search {
    width: 100%; padding: 13px 16px 13px 44px; background: #1e293b; border: 1px solid #334155;
    border-radius: 12px; color: #e2e8f0; font-size: 15px; outline: none; transition: all .2s;
  }
  #search::placeholder { color: #64748b; }
  #search:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-top: 40px; }
  @media (max-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); } }
  @media (max-width: 380px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: #1e293b; border: 1px solid rgba(51,65,85,.5); border-radius: 16px;
    overflow: hidden; display: flex; flex-direction: column;
    transition: transform .2s, border-color .2s, box-shadow .2s;
  }
  .card:hover { transform: translateY(-2px); border-color: rgba(99,102,241,.4); box-shadow: 0 10px 30px -15px rgba(0,0,0,.5); }
  .card-header { padding: 18px 20px 16px; }
  .card-header h3 { margin: 0; font-size: 17px; font-weight: 600; color: #f1f5f9; }
  .card-header span { display: block; margin-top: 4px; font-size: 12.5px; color: #64748b; }

  .preview-wrap {
    position: relative; height: 220px; background: #0f172a;
    border-top: 1px solid #0f172a; border-bottom: 1px solid #0f172a; overflow: auto;
  }
  .preview {
    width: 100%; height: 100%; min-height: 220px; display: flex;
    align-items: center; justify-content: center; padding: 20px;
  }
  .preview * { pointer-events: auto !important; }

  .code-view {
    display: none; position: absolute; inset: 0; margin: 0; padding: 16px;
    background: #0f172a; color: #cbd5e1; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 12px; line-height: 1.6; overflow: auto; white-space: pre;
  }
  .card.show-code .preview { display: none; }
  .card.show-code .code-view { display: block; }

  .card-footer {
    padding: 12px 18px; display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none; background: #1e293b; transition: background .15s;
  }
  .card-footer:hover { background: #233044; }
  .card-footer .left { display: flex; align-items: center; gap: 8px; color: #94a3b8; font-size: 13px; font-weight: 500; }
  .card-footer .left svg { width: 16px; height: 16px; stroke: currentColor; }
  .card-footer .right { color: #475569; transition: color .15s; }
  .card-footer .right svg { width: 18px; height: 18px; stroke: currentColor; }
  .card.show-code .card-footer .right { color: #818cf8; }

  .empty { text-align: center; padding: 60px 20px; color: #64748b; grid-column: 1/-1; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #475569; }
</style>

function render(filter = '') {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const f = filter.toLowerCase();
  const items = SNIPPETS_DATA.filter(s => 
    !f || s.title.toLowerCase().includes(f) || s.tags.some(t => t.includes(f))
  );
  
  if (items.length === 0) {
    grid.innerHTML = '<div class="empty">Nenhum snippet encontrado.</div>';
    return;
  }

  items.forEach(snippet => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <h3>${snippet.title}</h3>
        <span>${snippet.category}</span>
      </div>
      <div class="preview-wrap">
        <div class="preview"></div>
        <pre class="code-view"><code></code></pre>
      </div>
      <div class="card-footer">
        <div class="left">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
          <span class="toggle-text">Ver código</span>
        </div>
        <div class="right">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </div>
      </div>
    `;
    
    card.querySelector('.preview').innerHTML = snippet.code;
    card.querySelector('.code-view code').textContent = snippet.code.trim();
    
    const footer = card.querySelector('.card-footer');
    const toggleText = card.querySelector('.toggle-text');
    
    footer.addEventListener('click', () => {
      const showing = card.classList.toggle('show-code');
      toggleText.textContent = showing ? 'Ver preview' : 'Ver código';
    });
    
    grid.appendChild(card);
  });
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));
render();
